spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:housekey}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:housekey}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:housekey}}
    driver-class-name: org.postgresql.Driver

housekey:
  jwt:
    secret: ${HOUSEKEY_JWT_SECRET:local-development-jwt-secret-change-me-32b}
  dev-user:
    enabled: true
    username: agency.demo
    email: agency.demo@housekey.local
    password: Password123!
    role: AGENCY
    first-name: Demo
    last-name: Agency
